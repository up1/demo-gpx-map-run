<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GPX Viewer - WNU2026 50K</title>

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <script>
        window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
    </script>
    <script defer src="/_vercel/insights/script.js"></script>

    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div id="header">
        <h1>🗺️ GPX Viewer</h1>
        <p id="routeName">Select a route</p>
    </div>

    <select id="fileSelector">
        <option value="">Loading routes...</option>
    </select>

    <button id="downloadBtn" title="Download GPX file">⬇️</button>
    <button id="locationBtn" title="Show my location">📍</button>

    <div id="map"></div>

    <div id="info">
        <div class="info-item">
            <span class="info-label">Total Waypoints:</span>
            <span id="waypointCount">-</span>
        </div>
        <div class="info-item">
            <span class="info-label">Route Points:</span>
            <span id="routePointCount">-</span>
        </div>
        <div class="info-item">
            <span class="info-label">Distance:</span>
            <span id="distance">Calculating...</span>
        </div>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script src="app.js"></script>
</body>

</html>
